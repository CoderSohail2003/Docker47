<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Welcome</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #000; color: #fff; overflow-x: hidden;">

    <!-- Background Hero Section -->
    <div style="position: relative; width: 100%; height: 100vh; background: url('https://nflxext.com') no-repeat center center/cover; border-bottom: 8px solid #222;">
        
        <!-- Dark Overlay -->
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); background-image: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0, rgba(0, 0, 0, 0) 60%, rgba(0, 0, 0, 0.8) 100%);"></div>

        <!-- Navbar -->
        <nav style="position: relative; z-index: 10; display: flex; justify-content: space-between; align-items: center; padding: 25px 50px;">
            <img src="https://wikimedia.org" alt="Netflix Logo" style="height: 45px;">
            <a href="#" style="background-color: #e50914; color: #fff; padding: 7px 17px; text-decoration: none; border-radius: 3px; font-weight: 400; font-size: 1rem;">Sign In</a>
        </nav>

        <!-- Main Content -->
        <div style="position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 75vh; text-align: center; padding: 0 20px;">
            <h1 style="font-size: 3.125rem; font-weight: 700; max-width: 640px; margin: 0 0 10px;">Unlimited movies, TV shows, and more.</h1>
            <h2 style="font-size: 1.625rem; font-weight: 400; margin: 15px 0;">Watch anywhere. Cancel anytime.</h2>
            <p style="font-size: 1.2rem; margin: 20px 0;">Ready to watch? Enter your email to create or restart your membership.</p>
            
            <div style="display: flex; gap: 0; max-width: 700px; width: 100%;">
                <input type="email" placeholder="Email address" style="flex: 1; padding: 15px; font-size: 1rem; border: none; border-radius: 2px 0 0 2px;">
                <button style="background-color: #e50914; color: #fff; padding: 15px 30px; font-size: 1.5rem; border: none; border-radius: 0 2px 2px 0; cursor: pointer; display: flex; align-items: center;">
                    Get Started <span style="margin-left: 10px;">&gt;</span>
                </button>
            </div>
        </div>
    </div>

</body>
</html>
