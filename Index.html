<!DOCTYPE html>
<html>
<head>
    <title>Basic Inline CSS Page</title>
</head>
<!-- Applying a background color to the entire body -->
<body style="background-color: #f0f0f0; font-family: Arial, sans-serif; text-align: center; padding: 50px;">

    <!-- Inline styling for a heading -->
    <h1 style="color: #2c3e50; font-size: 36px; border-bottom: 2px solid #3498db; display: inline-block;">
        Welcome to My Page
    </h1>

    <!-- Inline styling for a paragraph -->
    <p style="color: #34495e; font-size: 18px; margin-top: 20px;">
        This paragraph is styled using <span style="color: #e74c3c; font-weight: bold;">inline CSS</span>.
    </p>

    <!-- Inline styling for a button-like link -->
    <a href="#" style="background-color: #3498db; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; margin-top: 20px;">
        Click Me
    </a>

</body>
</html>
